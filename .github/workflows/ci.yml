name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      - name: ruff
        run: ruff check src/devlog
      - name: ruff format
        run: ruff format --check src/devlog
      - name: mypy
        run: mypy
      - name: pylint
        run: pylint src/devlog
      - name: xenon (radon CC gate)
        run: xenon --max-absolute B --max-modules B --max-average A src/devlog
